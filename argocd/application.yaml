apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: flask-app

  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/LunaAlbatross/eks-production-platform-demo.git
    targetRevision: main
    path: kubernetes

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
